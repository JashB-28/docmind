name: Deploy (CD)

# Manual button by default so it never runs until you've set up the AWS side.
# To deploy automatically on every merge to main, uncomment the `push` trigger.
on:
  workflow_dispatch:
  # push:
  #   branches: [main]

permissions:
  id-token: write   # required for GitHub OIDC → AWS (keyless auth)
  contents: read

env:
  AWS_REGION: us-east-1
  ECR_REPOSITORY: docmind

jobs:
  deploy:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      # Exchange a short-lived GitHub OIDC token for temporary AWS credentials.
      # No access keys are ever stored in GitHub — only the role ARN.
      - name: Configure AWS credentials (OIDC)
        uses: aws-actions/configure-aws-credentials@v4
        with:
          role-to-assume: ${{ secrets.AWS_DEPLOY_ROLE_ARN }}
          aws-region: ${{ env.AWS_REGION }}

      - name: Log in to Amazon ECR
        id: ecr
        uses: aws-actions/amazon-ecr-login@v2

      - name: Build and push image to ECR
        env:
          REGISTRY: ${{ steps.ecr.outputs.registry }}
        run: |
          IMAGE="$REGISTRY/$ECR_REPOSITORY"
          docker build -t "$IMAGE:latest" -t "$IMAGE:${{ github.sha }}" .
          docker push "$IMAGE:latest"
          docker push "$IMAGE:${{ github.sha }}"

      # Tell the EC2 box to pull the new image and restart — over SSM, so there
      # is no inbound SSH and no SSH key to manage.
      - name: Deploy on EC2 via SSM Run Command
        run: |
          aws ssm send-command \
            --instance-ids "${{ secrets.EC2_INSTANCE_ID }}" \
            --document-name "AWS-RunShellScript" \
            --comment "Deploy DocMind ${{ github.sha }}" \
            --parameters commands="cd /opt/docmind && git pull --ff-only && bash deploy/deploy.sh" \
            --region "$AWS_REGION"
