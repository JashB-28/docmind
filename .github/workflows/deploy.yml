name: Deploy (CD)

# Manual button by default so it never runs until you've configured the secrets.
# To deploy automatically on every merge to main, uncomment the `push` trigger.
on:
  workflow_dispatch:
  # push:
  #   branches: [main]

permissions:
  id-token: write   # for GitHub OIDC → AWS (used by the SSM deploy step)
  contents: read

env:
  AWS_REGION: us-east-1
  IMAGE: jash09/docmind

jobs:
  deploy:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Log in to Docker Hub
        uses: docker/login-action@v3
        with:
          username: ${{ secrets.DOCKERHUB_USERNAME }}
          password: ${{ secrets.DOCKERHUB_TOKEN }}

      - name: Build and push image
        run: |
          docker build -t "$IMAGE:latest" -t "$IMAGE:${{ github.sha }}" .
          docker push "$IMAGE:latest"
          docker push "$IMAGE:${{ github.sha }}"

      # Temporary AWS creds via OIDC — only needed to send the SSM command.
      - name: Configure AWS credentials (OIDC)
        uses: aws-actions/configure-aws-credentials@v4
        with:
          role-to-assume: ${{ secrets.AWS_DEPLOY_ROLE_ARN }}
          aws-region: ${{ env.AWS_REGION }}

      # Tell the EC2 box to pull the new image and restart — over SSM, so there
      # is no inbound SSH and no SSH key to manage.
      - name: Deploy on EC2 via SSM Run Command
        run: |
          aws ssm send-command \
            --instance-ids "${{ secrets.EC2_INSTANCE_ID }}" \
            --document-name "AWS-RunShellScript" \
            --comment "Deploy DocMind ${{ github.sha }}" \
            --parameters commands="cd /opt/docmind && git pull --ff-only && bash deploy/deploy.sh" \
            --region "$AWS_REGION"
